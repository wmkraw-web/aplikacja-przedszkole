<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptMaster Pro - Edycja Przedszkole</title>
    <link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. KLUCZ GEMINI (Sztuczna inteligencja)
        // ==========================================
        const apiKey = "AIzaSyDGxQE7j-q4QrYNhycUVRMJSvVJTxxLs2M"; 

        // ==========================================
        // 2. CHMURA FIREBASE (Baza danych)
        // ==========================================
        const firebaseConfig = {
          apiKey: "AIzaSyA8wriwwAViJogzGoRXQh7cqerFq2bj5Sg",
          authDomain: "aplikacja-przedszkole.firebaseapp.com",
          projectId: "aplikacja-przedszkole",
          storageBucket: "aplikacja-przedszkole.firebasestorage.app",
          messagingSenderId: "84516078949",
          appId: "1:84516078949:web:4d0407a9b5aaba2dd3cd8c"
        };
        
        // Inicjalizacja chmury
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const { useState, useEffect } = React;

        // Ikony SVG
        const IconWand = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 4V2"/><path d="M15 16v-2"/><path d="M8 9h2"/><path d="M20 9h2"/><path d="M17.8 11.8L19 13"/><path d="M15 9h0"/><path d="M17.8 6.2L19 5"/><path d="m3 21 9-9"/><path d="M12.2 6.2 11 5"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
        const IconBook = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const IconSave = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
        const IconCopy = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
        const IconCloud = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>;

        const defaultTemplates = [
            {
                name: "WOPFU / IPET",
                data: {
                    title: "Szablon IPET (Autyzm)",
                    role: "Doświadczony pedagog specjalny i diagnosta",
                    task: "Przygotuj zarys Wielospecjalistycznej Oceny Poziomu Funkcjonowania Ucznia (WOPFU) oraz propozycję celów do Indywidualnego Programu Edukacyjno-Terapeutycznego (IPET).",
                    context: "Dziecko 5-letnie, autyzm wczesnodziecięcy. Trudności w komunikacji (mowa bierna dobra, czynna ograniczona do pojedynczych słów, wprowadzane AAC - piktogramy). Nadwrażliwość słuchowa i dotykowa. Zaburzenia koncentracji. Mocne strony: świetna pamięć wzrokowa, zamiłowanie do układanek.",
                    constraints: "Cele muszą być mierzalne (metoda SMART). Użyj profesjonalnego języka pedagogicznego.",
                    format: "Tabela z dwiema kolumnami: 1. Sfera, 2. Opis/Cele."
                }
            },
            {
                name: "Ewaluacja",
                data: {
                    title: "Półroczna Ewaluacja Postępów",
                    role: "Nauczyciel wychowania przedszkolnego i oligofrenopedagog",
                    task: "Napisz ewaluację postępów dziecka po I półroczu pracy, uwzględniając realizację założeń IPET.",
                    context: "Dziecko 6-letnie, niepełnosprawność intelektualna w stopniu umiarkowanym. Przepracowano samoobsługę (samodzielne mycie rąk, trening czystości) oraz motorykę małą. Postępy w zgłaszaniu potrzeb.",
                    constraints: "Raport ma mieć wydźwięk pozytywny, skupiać się na potencjale. Unikaj stygmatyzującego języka.",
                    format: "Akapity dla każdej sfery + lista punktowana z wnioskami."
                }
            },
            {
                name: "Rewalidacja",
                data: {
                    title: "Scenariusz: Integracja Sensoryczna",
                    role: "Terapeuta pedagogiczny i terapeuta SI",
                    task: "Opracuj szczegółowy scenariusz zajęć rewalidacyjnych (czas trwania: 45 minut).",
                    context: "Dziecko 4-letnie z obniżonym napięciem mięśniowym. Cel to stymulacja układu przedsionkowego, proprioceptywnego oraz wzmacnianie obręczy barkowej.",
                    constraints: "Aktywności bezpieczne, atrakcyjne dla 4-latka, z elementami zabawy. Uwzględnij fazę wyciszenia.",
                    format: "Konspekt: Cel główny, Cele szczegółowe, Pomoce, Przebieg (Tabela)."
                }
            }
        ];

        const App = () => {
            const [view, setView] = useState('builder');
            const [prompts, setPrompts] = useState([]);
            const [activePrompt, setActivePrompt] = useState({
                id: Date.now(), title: '', role: '', context: '', task: '', constraints: '', format: '', output: '', isOptimized: false
            });
            const [isOptimizing, setIsOptimizing] = useState(false);
            const [error, setError] = useState(null);
            const [isConnected, setIsConnected] = useState(false);

            // Łączenie z chmurą Firebase (nasłuchiwanie zmian na żywo)
            useEffect(() => {
                const unsubscribe = db.collection("prompts")
                    .orderBy("createdAt", "desc")
                    .onSnapshot((snapshot) => {
                        const loadedPrompts = snapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                        setPrompts(loadedPrompts);
                        setIsConnected(true);
                    }, (err) => {
                        console.error("Błąd połączenia z chmurą:", err);
                        setError("Problem z synchronizacją z chmurą.");
                    });

                return () => unsubscribe();
            }, []);

            const optimizePrompt = async () => {
                if (!apiKey || apiKey === "WKLEJ_TUTAJ_KLUCZ_GEMINI") {
                    setError("Brak klucza API Gemini! Dodaj klucz w pliku kodu.");
                    return;
                }
                if (!activePrompt.task) {
                    setError("Zadanie (Task) nie może być puste.");
                    return;
                }

                setIsOptimizing(true);
                setError(null);

                const userQuery = `Przekształć w profesjonalny prompt dla AI. 
                Rola: ${activePrompt.role}
                Kontekst: ${activePrompt.context}
                Zadanie: ${activePrompt.task}
                Ograniczenia: ${activePrompt.constraints}
                Format: ${activePrompt.format}`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userQuery }] }],
                            systemInstruction: { parts: [{ text: "Jesteś ekspertem Prompt Engineeringu. Minimalizuj halucynacje, maksymalizuj precyzję." }] }
                        })
                    });

                    if (!response.ok) throw new Error('Błąd API');
                    const data = await response.json();
                    const result = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    setActivePrompt(prev => ({ ...prev, output: result, isOptimized: true }));
                } catch (err) {
                    setError("Błąd optymalizacji. Sprawdź połączenie z internetem.");
                } finally {
                    setIsOptimizing(false);
                }
            };

            const buildManualPrompt = () => {
                let p = "";
                if (activePrompt.role) p += `### ROLA\n${activePrompt.role}\n\n`;
                if (activePrompt.context) p += `### KONTEKST\n${activePrompt.context}\n\n`;
                if (activePrompt.task) p += `### ZADANIE\n${activePrompt.task}\n\n`;
                if (activePrompt.constraints) p += `### OGRANICZENIA\n${activePrompt.constraints}\n\n`;
                if (activePrompt.format) p += `### FORMAT WYNIKOWY\n${activePrompt.format}\n\n`;
                return p.trim();
            };

            // Zapis do CHMURY FIREBASE
            const handleSave = async () => {
                const finalContent = activePrompt.isOptimized ? activePrompt.output : buildManualPrompt();
                if (!activePrompt.title || !finalContent) {
                    setError("Podaj tytuł i wypełnij zadanie przed zapisem.");
                    return;
                }
                
                try {
                    await db.collection("prompts").add({
                        title: activePrompt.title,
                        role: activePrompt.role,
                        context: activePrompt.context,
                        task: activePrompt.task,
                        constraints: activePrompt.constraints,
                        format: activePrompt.format,
                        content: finalContent,
                        isOptimized: activePrompt.isOptimized,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    setActivePrompt({ id: Date.now(), title: '', role: '', context: '', task: '', constraints: '', format: '', output: '', isOptimized: false });
                    setError(null);
                    setView('library');
                } catch(err) {
                    console.error("Błąd zapisu:", err);
                    setError("Nie udało się zapisać promptu w chmurze.");
                }
            };

            // Usuwanie z CHMURY FIREBASE
            const deleteSaved = async (id) => {
                try {
                    await db.collection("prompts").doc(id).delete();
                } catch(err) {
                    console.error("Błąd usuwania:", err);
                }
            };

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text).then(() => {
                    alert("Skopiowano do schowka!");
                });
            };

            const applyTemplate = (data) => {
                setActivePrompt({ ...activePrompt, ...data, output: '', isOptimized: false });
            };

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Sidebar */}
                    <div className="w-full md:w-64 bg-white border-r border-slate-200 p-4 flex flex-col gap-2">
                        <div className="flex items-center gap-2 px-2 py-4 mb-4">
                            <div className="bg-indigo-600 p-2 rounded-lg text-white">
                                <IconWand />
                            </div>
                            <h1 className="font-bold text-xl tracking-tight">PromptMaster</h1>
                        </div>
                        
                        <button onClick={() => setView('builder')} className={`flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${view === 'builder' ? 'bg-indigo-50 text-indigo-600 font-semibold' : 'hover:bg-slate-100 text-slate-500'}`}>
                            <IconPlus /> Kreator
                        </button>
                        <button onClick={() => setView('library')} className={`flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${view === 'library' ? 'bg-indigo-50 text-indigo-600 font-semibold' : 'hover:bg-slate-100 text-slate-500'}`}>
                            <IconBook /> Biblioteka ({prompts.length})
                        </button>

                        <div className="mt-auto pt-4 border-t border-slate-100 text-xs text-slate-400 px-4 flex flex-col gap-1">
                            {isConnected ? (
                                <div className="text-green-600 font-bold flex items-center gap-1"><IconCloud /> Połączono z chmurą</div>
                            ) : (
                                <div className="text-amber-500 flex items-center gap-1"><IconCloud /> Łączenie z chmurą...</div>
                            )}
                            Wersja: Chmura Firebase
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 overflow-y-auto h-screen p-4 md:p-8">
                        {view === 'builder' ? (
                            <div className="max-w-4xl mx-auto space-y-6">
                                <header className="flex justify-between items-center">
                                    <div>
                                        <h2 className="text-2xl font-bold">Stwórz nowy prompt</h2>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={optimizePrompt} disabled={isOptimizing} className="flex items-center gap-2 bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 disabled:opacity-50">
                                            {isOptimizing ? 'Optymalizacja...' : <><IconWand /> AI Optymalizuj</>}
                                        </button>
                                        <button onClick={handleSave} className="flex items-center gap-2 bg-white border border-slate-200 px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-50">
                                            <IconSave /> Zapisz
                                        </button>
                                    </div>
                                </header>

                                {error && <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm font-medium">{error}</div>}

                                <div className="bg-indigo-50 border border-indigo-100 p-4 rounded-xl flex flex-wrap gap-2 items-center">
                                    <span className="text-sm font-bold text-indigo-900 mr-2">Szybki start:</span>
                                    {defaultTemplates.map((t, i) => (
                                        <button key={i} onClick={() => applyTemplate(t.data)} className="bg-white text-indigo-700 text-xs px-3 py-1.5 rounded border border-indigo-200 hover:bg-indigo-600 hover:text-white">
                                            {t.name}
                                        </button>
                                    ))}
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-white p-5 rounded-2xl border border-slate-200 space-y-4 shadow-sm">
                                        <div>
                                            <label className="text-xs font-bold text-slate-400 uppercase">Tytuł</label>
                                            <input type="text" className="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-indigo-500" value={activePrompt.title} onChange={e => setActivePrompt({...activePrompt, title: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-400 uppercase">Rola (np. Pedagog)</label>
                                            <input type="text" className="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-indigo-500" value={activePrompt.role} onChange={e => setActivePrompt({...activePrompt, role: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-400 uppercase">Zadanie</label>
                                            <textarea rows="3" className="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-indigo-500" value={activePrompt.task} onChange={e => setActivePrompt({...activePrompt, task: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-slate-400 uppercase">Kontekst (Opis dziecka)</label>
                                            <textarea rows="2" className="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-indigo-500" value={activePrompt.context} onChange={e => setActivePrompt({...activePrompt, context: e.target.value})} />
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div>
                                                <label className="text-xs font-bold text-slate-400 uppercase">Zasady</label>
                                                <input type="text" className="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none" value={activePrompt.constraints} onChange={e => setActivePrompt({...activePrompt, constraints: e.target.value})} />
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-slate-400 uppercase">Format</label>
                                                <input type="text" className="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg outline-none" value={activePrompt.format} onChange={e => setActivePrompt({...activePrompt, format: e.target.value})} />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-900 rounded-2xl flex flex-col shadow-lg overflow-hidden min-h-[400px]">
                                        <div className="p-3 border-b border-slate-800 flex justify-between items-center">
                                            <span className="text-slate-400 text-xs font-bold uppercase">{activePrompt.isOptimized ? 'Zoptymalizowano (AI)' : 'Podgląd'}</span>
                                            <button onClick={() => copyToClipboard(activePrompt.isOptimized ? activePrompt.output : buildManualPrompt())} className="text-slate-400 hover:text-white"><IconCopy /></button>
                                        </div>
                                        <div className="p-5 text-slate-300 font-mono text-sm whitespace-pre-wrap overflow-y-auto flex-1">
                                            {activePrompt.isOptimized ? activePrompt.output : (buildManualPrompt() || "// Wypełnij pola po lewej...")}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="max-w-4xl mx-auto space-y-6">
                                <h2 className="text-2xl font-bold mb-6">Biblioteka Szablonów</h2>
                                {prompts.length === 0 ? (
                                    <div className="text-center p-10 bg-white rounded-2xl border border-slate-200">
                                        <p className="text-slate-500">Brak zapisanych promptów w chmurze.</p>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {prompts.map(p => (
                                            <div key={p.id} className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col">
                                                <div className="flex justify-between items-start mb-2">
                                                    <h3 className="font-bold">{p.title}</h3>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => copyToClipboard(p.content)} className="text-indigo-600 hover:bg-indigo-50 p-1 rounded"><IconCopy /></button>
                                                        <button onClick={() => deleteSaved(p.id)} className="text-red-500 hover:bg-red-50 p-1 rounded"><IconTrash /></button>
                                                    </div>
                                                </div>
                                                <div className="text-xs text-slate-500 mb-4 bg-slate-50 p-2 rounded max-h-32 overflow-y-auto whitespace-pre-wrap flex-1">
                                                    {p.content}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
